# =============================================================================
#  TilesERP — Main ERP app
#  Domain : app.sanitileserp.com
#  Behavior : same SPA bundle as root domain, but root path "/" is rewritten
#             to "/login" so users land on the ERP login page directly.
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name app.sanitileserp.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://app.sanitileserp.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.sanitileserp.com;

    ssl_certificate     /etc/letsencrypt/live/app.sanitileserp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.sanitileserp.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/tilessaas/dist;
    index index.html;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    server_tokens off;

    client_max_body_size 20M;

    # Host-based entry rewrite:
    #   app.sanitileserp.com/        →  /login   (still serves index.html, React routes to /login)
    location = / {
        return 302 /login;
    }

    # Anyone on this subdomain trying to access portal pages → portal subdomain
    location ^~ /portal/ { return 301 https://portal.sanitileserp.com$request_uri; }
    location = /portal   { return 301 https://portal.sanitileserp.com/portal; }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static asset caching
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpe?g|gif|ico|webp)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml;
}
