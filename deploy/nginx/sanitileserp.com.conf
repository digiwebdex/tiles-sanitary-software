# =============================================================================
#  TilesERP — Marketing / Landing site
#  Domain : sanitileserp.com  +  www.sanitileserp.com
#  Project root : /var/www/tilessaas
#  Isolated config — does NOT touch other VPS projects.
# =============================================================================

# ── HTTP (port 80) — ACME challenge + redirect to HTTPS ──────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name sanitileserp.com www.sanitileserp.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://sanitileserp.com$request_uri;
    }
}

# ── HTTPS — www → root redirect ──────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.sanitileserp.com;

    ssl_certificate     /etc/letsencrypt/live/sanitileserp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sanitileserp.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://sanitileserp.com$request_uri;
}

# ── HTTPS — Marketing/landing site (root domain) ─────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sanitileserp.com;

    ssl_certificate     /etc/letsencrypt/live/sanitileserp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sanitileserp.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Same single SPA bundle, served from project dist/
    root /var/www/tilessaas/dist;
    index index.html;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Hide nginx version
    server_tokens off;

    # Marketing site: open at "/" (LandingPage)
    # If anyone hits /login or /portal here, bounce them to the right subdomain.
    location = /login                { return 301 https://app.sanitileserp.com/login; }
    location ^~ /portal/             { return 301 https://portal.sanitileserp.com$request_uri; }
    location = /portal               { return 301 https://portal.sanitileserp.com/portal; }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache static assets
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpe?g|gif|ico|webp)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml;
}
