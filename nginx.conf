server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Force HTTPS (when behind a reverse proxy / load balancer)
  if ($http_x_forwarded_proto = "http") {
    return 301 https://$host$request_uri;
  }

  # Security headers
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-ancestors 'none';" always;

  # Disable server tokens (X-Powered-By equivalent for nginx)
  server_tokens off;

  # Cookie security (proxy headers for upstream)
  proxy_cookie_flags ~ httponly secure samesite=strict;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff" always;
  }

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml;
}
